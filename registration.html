<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration</title>
</head>
<body>

  <h1>Student Registration Form</h1>

  <form action="#" method="post">

    <label>Name: <input type="text" name="name" placeholder="Enter your name"></label><br><br>

    <label>Registration Number: <input type="text" name="reg_no" placeholder="e.g. 24-PW-BCS-0011"></label><br><br>

    <label>Email: <input type="email" name="email" placeholder="you@example.com"></label><br><br>

    <label>Password: <input type="password" name="password"></label><br><br>

    <label>Course:
      <select name="course">
        <option value="cs">Computer Science</option>
        <option value="ee">Electrical Engineering</option>
        <option value="me">Mechanical Engineering</option>
        <option value="ag">Agriculture Engineering</option>
        <option value="en">Energy Engineering</option>
        <option value="ce">Civil Engineering</option>
        <option value="it">Industrial Engineering</option>
        <option value="ch">Chemical Engineering</option>
        <option value="bi">Computer Systems Engineering</option>
        <option value="ma">Mining Engineering</option>

      </select>
    </label><br><br>

    <p>Semester:</p>
    <label><input type="radio" name="semester" value="1"> 1st</label>
    <label><input type="radio" name="semester" value="2"> 2nd</label>
    <label><input type="radio" name="semester" value="3"> 3rd</label>
    <label><input type="radio" name="semester" value="4"> 4th</label>
    <label><input type="radio" name="semester" value="5"> 5th</label>
    <label><input type="radio" name="semester" value="6"> 6th</label>
    <label><input type="radio" name="semester" value="7"> 7th</label>
    <label><input type="radio" name="semester" value="8"> 8th</label>
    <br><br>

    <label><input type="checkbox" name="terms"> I agree to the Terms and Conditions</label><br><br>

    <input type="submit" value="Register">

  </form>

</body>
</html>
