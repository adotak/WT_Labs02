<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 8 — Navigation Menu Styling</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    /* Horizontal Nav */
    .nav-h {
      display: flex; align-items: center; gap: 15px;
      background: #1a1a2e; padding: 12px 25px; border-radius: 8px;
      margin-bottom: 15px;
    }
    .nav-h .logo { color: #fff; font-weight: 700; font-size: 1.2em; }
    .nav-h a {
      color: #a2d2ff; text-decoration: none; padding: 6px 14px;
      border-radius: 5px; transition: all 0.3s;
    }
    .nav-h a:hover { background: #0f3460; color: #fff; }
    .nav-h a.active { background: #e94560; color: #fff; }

    /* Vertical Nav */
    .nav-v {
      width: 220px; background: #1a1a2e; border-radius: 8px;
      padding: 15px 0; margin-bottom: 15px;
    }
    .nav-v a {
      display: block; color: #a2d2ff; text-decoration: none;
      padding: 10px 25px; transition: all 0.3s;
    }
    .nav-v a:hover { background: #0f3460; color: #fff; padding-left: 30px; }
    .nav-v a.active { background: #e94560; color: #fff; border-left: 4px solid #fff; }

    /* Dropdown */
    .dropdown { position: relative; display: inline-block; }
    .dropdown > a::after { content: " ▾"; }
    .dropdown-menu {
      display: none; position: absolute; top: 100%; left: 0;
      background: #16213e; border-radius: 6px; min-width: 180px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10;
      padding: 8px 0;
    }
    .dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a {
      display: block; color: #a2d2ff; text-decoration: none;
      padding: 8px 20px; transition: background 0.2s;
    }
    .dropdown-menu a:hover { background: #0f3460; color: #fff; }

    /* Breadcrumb */
    .breadcrumb {
      display: flex; gap: 8px; padding: 10px 15px;
      background: #f0f2f5; border-radius: 6px; margin-bottom: 15px;
    }
    .breadcrumb a { color: #0f3460; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { color: #999; }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Back</a>
  <div class="header"><h1>Task 8: Navigation Menu Styling</h1></div>

  <div class="box">
    <h2>Horizontal Navigation</h2>
    <nav class="nav-h">
      <span class="logo">Ahmad.dev</span>
      <a href="#" class="active">Home</a>
      <a href="#">About</a>
      <div class="dropdown">
        <a href="#">Courses</a>
        <div class="dropdown-menu">
          <a href="#">HTML</a>
          <a href="#">CSS</a>
          <a href="#">JavaScript</a>
        </div>
      </div>
      <a href="#">Contact</a>
    </nav>
  </div>

  <div class="box">
    <h2>Vertical Navigation</h2>
    <nav class="nav-v">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#">Courses</a>
      <a href="#">Settings</a>
      <a href="#">Logout</a>
    </nav>
  </div>

  <div class="box">
    <h2>Breadcrumb Navigation</h2>
    <div class="breadcrumb">
      <a href="#">Home</a>
      <span>/</span>
      <a href="#">Courses</a>
      <span>/</span>
      <span>CSS Fundamentals</span>
    </div>
  </div>

  <footer><p>CS 224L — UET Peshawar</p></footer>
</div>
</body>
</html>
