<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 4 — Image Styling Portfolio</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .gallery { display: flex; flex-wrap: wrap; gap: 20px; }
    .gallery img {
      width: 200px; height: 150px; object-fit: cover;
      transition: all 0.4s;
    }
    /* Rounded corners */
    .rounded { border-radius: 15px; }
    /* Circle */
    .circle { border-radius: 50%; width: 150px !important; height: 150px !important; }
    /* Border & shadow */
    .bordered { border: 4px solid #e94560; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    /* Hover */
    .gallery img:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    /* Filters */
    .gray { filter: grayscale(100%); }
    .gray:hover { filter: grayscale(0); }
    .blur { filter: blur(2px); }
    .blur:hover { filter: blur(0); }
    .sepia { filter: sepia(80%); }
    .sepia:hover { filter: sepia(0); }

    /* Overlay */
    .overlay-wrap {
      position: relative; width: 200px; border-radius: 10px;
      overflow: hidden; display: inline-block;
    }
    .overlay-wrap img { width: 100%; height: 150px; object-fit: cover; display: block; }
    .overlay-text {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff; padding: 15px 10px 10px; text-align: center;
      transform: translateY(100%); transition: transform 0.3s;
    }
    .overlay-wrap:hover .overlay-text { transform: translateY(0); }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Back</a>
  <div class="header"><h1>Task 4: Image Styling Portfolio</h1></div>

  <div class="box">
    <h2>Rounded & Circular</h2>
    <div class="gallery">
      <img src="https://picsum.photos/201/150" alt="Rounded" class="rounded">
      <img src="https://picsum.photos/150/150" alt="Circle" class="circle">
      <img src="https://picsum.photos/202/150" alt="Bordered" class="bordered rounded">
    </div>
  </div>

  <div class="box">
    <h2>CSS Filters (hover to remove)</h2>
    <div class="gallery">
      <img src="https://picsum.photos/203/150" alt="Grayscale" class="gray rounded">
      <img src="https://picsum.photos/204/150" alt="Blur" class="blur rounded">
      <img src="https://picsum.photos/205/150" alt="Sepia" class="sepia rounded">
    </div>
  </div>

  <div class="box">
    <h2>Image Overlay (hover)</h2>
    <div class="gallery">
      <div class="overlay-wrap">
        <img src="https://picsum.photos/206/150" alt="Nature">
        <div class="overlay-text">Nature</div>
      </div>
      <div class="overlay-wrap">
        <img src="https://picsum.photos/207/150" alt="City">
        <div class="overlay-text">Cityscape</div>
      </div>
      <div class="overlay-wrap">
        <img src="https://picsum.photos/208/150" alt="Travel">
        <div class="overlay-text">Travel</div>
      </div>
    </div>
  </div>

  <footer><p>CS 224L — UET Peshawar</p></footer>
</div>
</body>
</html>
